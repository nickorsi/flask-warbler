name: Ping Healthcheck

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping frontend
        run: |
          curl --max-time 90 --fail --silent --show-error \
          https://nick-orsi-warbler.onrender.com/healthcheck